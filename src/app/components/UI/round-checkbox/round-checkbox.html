<label class="round-checkbox" [class.round-checkbox--checked]="checked()" [class.round-checkbox--disabled]="disabled()" (click)="toggle()">
  <span class="round-checkbox__box">
    <svg class="round-checkbox__icon" viewBox="0 0 12 10">
      <polyline points="1.5 5.5 4.5 8.5 10.5 1.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
  <span class="round-checkbox__label">
    <ng-content/>
  </span>
</label>
